<mat-sidenav-container class="layout-container">
  <mat-sidenav
    class="layout-sidenav"
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="!isHandset() || sidenavOpen()"
    (closedStart)="sidenavOpen.set(false)"
  >
    <div class="sidenav-inner">
      <div class="sidenav-brand">
        <div class="brand-icon">
          <mat-icon>monitor_heart</mat-icon>
        </div>
        <div>
          <h2>HealthCare Plus</h2>
          <p>HMS Dashboard</p>
        </div>
      </div>

      <nav class="sidenav-nav">
        @for (item of menuItems; track item.path) {
          <a
            mat-button
            class="nav-link"
            [routerLink]="item.path"
            [routerLinkActive]="item.activeClass"
            [routerLinkActiveOptions]="{ exact: item.exact }"
            (click)="closeSidenav()"
          >
            <mat-icon>{{ item.icon }}</mat-icon>
            <span>{{ item.label }}</span>
          </a>
        }
      </nav>

      <div class="sidenav-footer">
        <button mat-button class="nav-link">
          <mat-icon>settings</mat-icon>
          <span>Settings</span>
        </button>
        <button mat-button class="nav-link nav-link--logout" (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="layout-content">
    <header class="layout-header">
      @if (isHandset()) {
        <button mat-icon-button (click)="toggleSidenav()" aria-label="Open menu">
          <mat-icon>menu</mat-icon>
        </button>
      }

      <div class="header-actions">
        <button mat-icon-button class="notification-btn" aria-label="Notifications">
          <mat-icon
            matBadge="3"
            matBadgeColor="warn"
            matBadgeSize="small"
            aria-hidden="false"
          >
            notifications
          </mat-icon>
        </button>

        <div class="user-profile">
          <div class="user-avatar">{{ userInitials }}</div>
          <div class="user-info">
            <p class="user-name">{{ username }}</p>
            <p class="user-email">{{ username }}&#64;healthcare.com</p>
          </div>
        </div>
      </div>
    </header>

    <main class="layout-main">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
