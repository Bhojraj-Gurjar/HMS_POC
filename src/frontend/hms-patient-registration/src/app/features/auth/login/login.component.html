<div class="login-page">
  <div class="login-bg"></div>

  <div class="login-content">
    <div class="login-brand">
      <div class="login-logo">
        <mat-icon>monitor_heart</mat-icon>
      </div>
      <h1>HealthCare Plus</h1>
      <p>Hospital Management System</p>
    </div>

    <mat-card class="login-card">
      <mat-card-header>
        <mat-card-title>Admin Login</mat-card-title>
        <mat-card-subtitle>Enter your credentials to access the dashboard</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Username</mat-label>
            <mat-icon matPrefix>person</mat-icon>
            <input matInput formControlName="username" placeholder="admin" autocomplete="username" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Password</mat-label>
            <mat-icon matPrefix>lock</mat-icon>
            <input
              matInput
              type="password"
              formControlName="password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
          </mat-form-field>

          <button mat-flat-button type="submit" class="login-submit full-width">
            Sign In
          </button>
        </form>

        <p class="login-hint">Demo credentials: admin / admin123</p>
      </mat-card-content>
    </mat-card>

    <p class="login-footer">Secure • Reliable • Professional</p>
  </div>
</div>
